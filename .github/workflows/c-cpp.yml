name: C/C++ CI

on:
  push:
    branches: [ "action-playground" ]
  pull_request:
    branches: [ "action-playground" ]

jobs:
  build:
    name: compile
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Inspect resource folders
      run: |
        echo "=== LISTING /Core/Resources ==="
        Get-ChildItem -Recurse Core/Resources | Select-Object FullName
    - name: Show project paths
      run: |
        echo "=== VCXPROJ CONTENTS ==="
        Get-ChildItem Core/Scripts/mainscript -Filter *.vcxproj | % { Get-Content $_ }



    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build solution
      run: |
        $sln = Get-ChildItem -Path . -Filter *.sln | Select-Object -First 1
        if (-not $sln) { throw "No .sln found at repo root" }
        msbuild $sln.FullName /p:Configuration=Debug /p:Platform=x64

    - name: Create Executables directory
      run: mkdir Executables

    - name: Move built executable
      run: |
        $exe = Get-ChildItem -Recurse -Filter *.exe | Where-Object { $_.FullName -like "*Debug*" }
        if (-not $exe) { throw "No executable produced" }
        Copy-Item $exe.FullName Executables/

    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: built-executable
        path: Executables/
