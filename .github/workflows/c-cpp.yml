name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: compile
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # Optional: Setup Visual Studio Developer Command Prompt environment
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build Visual Studio project
      working-directory: Core/Scripts/mainscript
      run: |
        msbuild *.sln /p:Configuration=Debug /p:Platform=x64

    - name: Create Executables directory
      run: mkdir Executables

    - name: Move built executable
      run: |
        $exe = Get-ChildItem -Recurse -Filter *.exe | Where-Object { $_.FullName -like "*Release*" }
        Copy-Item $exe.FullName Executables/

    - name: Upload executable artifact
      uses: actions/upload-artifact@v4
      with:
        name: built-executable
        path: Executables/
